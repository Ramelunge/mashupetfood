<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mashu — Pedidos</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --brown:#3B2008;--brown-mid:#6B3A1F;--brown-light:#9C6B4A;
  --yellow:#F5C300;--cream:#FAF5EE;--cream2:#F2E9DC;
  --white:#FFFFFF;--text:#111;--muted:#6B5A4E;--border:#EDE0D0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:var(--white);color:var(--text);-webkit-font-smoothing:antialiased}

/* ── NAV ── */
.nav{background:var(--brown);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;z-index:200}
.nav-menu{display:flex;align-items:center;gap:10px;color:rgba(255,255,255,0.85);font-size:0.9rem;font-weight:700;cursor:pointer;background:none;border:none;font-family:'Nunito',sans-serif}
.nav-menu svg{width:20px;height:20px;stroke:rgba(255,255,255,0.85);fill:none;stroke-width:2;stroke-linecap:round}
.nav-center{display:flex;align-items:center;gap:10px;text-decoration:none;position:absolute;left:50%;transform:translateX(-50%)}
.nav-center img{height:38px;width:38px;object-fit:contain}
.nav-center-name{font-size:1.4rem;font-weight:900;color:white;letter-spacing:-0.02em}
.nav-order{background:var(--yellow);color:var(--brown);border:none;padding:10px 24px;border-radius:999px;font-family:'Nunito',sans-serif;font-size:0.88rem;font-weight:900;cursor:pointer;transition:transform .15s,box-shadow .15s}
.nav-order:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(245,195,0,0.4)}

/* ── DRAWER ── */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:300;opacity:0;pointer-events:none;transition:opacity .3s ease}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;top:0;left:0;height:100vh;width:380px;max-width:90vw;background:white;z-index:301;transform:translateX(-100%);transition:transform .35s cubic-bezier(.25,.46,.45,.94);display:flex;flex-direction:column;padding:28px 36px 48px;overflow-y:auto}
.drawer.open{transform:translateX(0)}
.drawer-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:20px;border-bottom:1px solid #eee;margin-bottom:8px}
.drawer-signin{font-size:1.1rem;font-weight:900;color:var(--text)}
.drawer-close{width:40px;height:40px;border-radius:50%;background:var(--yellow);border:none;cursor:pointer;font-size:1.1rem;font-weight:900;color:var(--brown);display:flex;align-items:center;justify-content:center;transition:background .15s}
.drawer-close:hover{background:#e0b200}
.drawer-links{display:flex;flex-direction:column;gap:0;margin-top:12px}
.drawer-link{font-size:2.4rem;font-weight:900;color:var(--text);text-decoration:none;padding:18px 0;line-height:1;border-bottom:1px solid #f0f0f0;transition:color .15s,padding-left .2s}
.drawer-link:last-child{border-bottom:none}
.drawer-link:hover{color:var(--brown);padding-left:10px}
.drawer-link.active{color:var(--brown)}
.drawer-bottom{margin-top:auto;padding-top:28px}
.drawer-order-btn{display:block;width:100%;padding:14px;border-radius:999px;background:var(--brown);color:white;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:900;border:none;cursor:pointer;text-align:center;transition:background .15s}
.drawer-order-btn:hover{background:var(--brown-mid)}

/* ── PAGE CONTENT ── */
.page-content{min-height:calc(100vh - 64px);padding:56px 40px 80px;display:flex;flex-direction:column;align-items:center}
.page-title{font-size:clamp(2.4rem,5vw,3.6rem);font-weight:900;color:var(--text);margin-bottom:48px;text-align:center;letter-spacing:-0.02em}

/* ── ORDER GRID ── */
.order-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:860px}

/* TOP CARDS — large, colored */
.order-card{border-radius:24px;border:3px solid var(--brown);box-shadow:5px 5px 0 var(--brown);cursor:pointer;transition:transform .15s,box-shadow .15s;text-decoration:none;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:32px 32px 36px;position:relative;overflow:hidden;min-height:300px}
.order-card:hover{transform:translate(-3px,-3px);box-shadow:8px 8px 0 var(--brown)}
.order-card:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--brown)}
.order-card.primary{background:var(--yellow)}
.order-card.secondary-card{background:var(--cream2)}

.card-illustration{width:100%;display:flex;align-items:center;justify-content:center;margin-bottom:16px;flex:1}
.card-illustration svg{width:180px;height:180px}
.card-label{font-size:2rem;font-weight:900;color:var(--brown);text-align:center;line-height:1.1}

/* BOTTOM CARDS — smaller, white */
.order-card-sm{border-radius:24px;border:3px solid var(--brown);box-shadow:5px 5px 0 var(--brown);cursor:pointer;transition:transform .15s,box-shadow .15s;text-decoration:none;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 28px;gap:14px;min-height:160px;background:var(--white)}
.order-card-sm:hover{transform:translate(-3px,-3px);box-shadow:8px 8px 0 var(--brown)}
.order-card-sm:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--brown)}
.order-card-sm svg{width:36px;height:36px;stroke:var(--brown);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.order-card-sm .sm-label{font-size:1rem;font-weight:800;color:var(--brown);text-align:center}

/* ── FOOTER ── */
footer{background:var(--brown);color:rgba(255,255,255,0.6);padding:28px 40px;text-align:center}
footer p{font-size:0.78rem}

/* ── SCOOTER ANIMATIONS ── */
@keyframes scooter-bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes wheel-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes speed-fade{0%{opacity:.15;transform:translateX(6px)}100%{opacity:1;transform:translateX(0)}}
@keyframes box-wobble{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
@keyframes rider-bob{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-3px) rotate(1deg)}}

#scooter-main{animation:scooter-bounce .65s ease-in-out infinite}
#house-main{animation:house-float .9s ease-in-out infinite}
#sun-spin{transform-box:fill-box;transform-origin:center;animation:sun-rotate 4s linear infinite}
#door-swing{transform-box:fill-box;transform-origin:100% 50%;animation:door-open 3s ease-in-out infinite}

@keyframes house-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes sun-rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes door-open{0%,60%,100%{transform:scaleX(1)}30%{transform:scaleX(0.15)}}
#spokes-left{transform-box:fill-box;transform-origin:center;animation:wheel-spin .45s linear infinite}
#spokes-right{transform-box:fill-box;transform-origin:center;animation:wheel-spin .45s linear infinite}
#speed-lines{animation:speed-fade .4s ease-in-out infinite alternate}
#delivery-boxes{transform-box:fill-box;transform-origin:50% 100%;animation:box-wobble .9s ease-in-out infinite}
#rider{transform-box:fill-box;transform-origin:50% 100%;animation:rider-bob .65s ease-in-out infinite}

@media(max-width:640px){
  .order-grid{grid-template-columns:1fr}
  .page-content{padding:40px 20px 60px}
  .order-card{min-height:240px}
}
</style>
</head>

<script>
function openDrawer(){
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');

}
